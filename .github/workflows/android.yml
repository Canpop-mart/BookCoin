name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter bookcoin-app build

      - name: Generate Android project
        working-directory: app
        run: |
          pnpm exec cap add android
          pnpm exec cap sync android

      # Allow plain-HTTP requests so the app can reach a NAS over the LAN
      - name: Allow cleartext HTTP
        run: sed -i 's/<application/<application android:usesCleartextTraffic="true"/' app/android/app/src/main/AndroidManifest.xml

      - name: Build debug APK
        working-directory: app/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp app/android/app/build/outputs/apk/debug/app-debug.apk bookcoin.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bookcoin-apk
          path: bookcoin.apk
          if-no-files-found: error

      - name: Attach APK to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: bookcoin.apk
