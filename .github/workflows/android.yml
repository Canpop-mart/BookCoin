name: Build Android APK

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'app/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter bookcoin-app build

      - name: Generate Android project
        working-directory: app
        run: |
          pnpm exec cap add android
          pnpm exec cap sync android

      # Launcher + adaptive icons and splash, from the committed PNGs in app/assets
      - name: Apply app icon & splash
        working-directory: app
        run: npx -y @capacitor/assets@3 generate --android --assetPath assets

      # Allow plain-HTTP requests so the app can reach a NAS over the LAN
      - name: Allow cleartext HTTP
        run: sed -i 's/<application/<application android:usesCleartextTraffic="true"/' app/android/app/src/main/AndroidManifest.xml

      # Sign the release on v* tags only when a keystore secret is configured;
      # otherwise fall back to a debug build so releases never break.
      - name: Decide signing
        id: signing
        env:
          KS: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KS" ] && [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "sign=true" >> "$GITHUB_OUTPUT"
          else
            echo "sign=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build signed release APK
        if: steps.signing.outputs.sign == 'true'
        working-directory: app/android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon
          echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
          BT="$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -n1)"
          "$BT/zipalign" -p -f 4 app/build/outputs/apk/release/app-release-unsigned.apk aligned.apk
          "$BT/apksigner" sign --ks release.keystore \
            --ks-pass "pass:$KEYSTORE_PASSWORD" --key-pass "pass:$KEY_PASSWORD" \
            --ks-key-alias "$KEY_ALIAS" --out "$GITHUB_WORKSPACE/bookcoin.apk" aligned.apk
          rm -f release.keystore

      - name: Build debug APK
        if: steps.signing.outputs.sign != 'true'
        working-directory: app/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon
          cp app/build/outputs/apk/debug/app-debug.apk "$GITHUB_WORKSPACE/bookcoin.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bookcoin-apk
          path: bookcoin.apk
          if-no-files-found: error

      - name: Attach APK to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: bookcoin.apk
          generate_release_notes: true
