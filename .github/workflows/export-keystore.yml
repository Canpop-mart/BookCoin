name: Export release keystore (recover)

# Recover the signing keystore from the KEYSTORE_BASE64 secret at any time.
# Run it (Actions tab → "Run workflow"), then download the artifact. This is the
# "GitHub is my backup" safety net — the key lives in the repo secret and this
# emits it back as a downloadable file.

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Emit keystore + credentials from secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "No KEYSTORE_BASE64 secret is set — nothing to recover."; exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
          echo "$KEYSTORE_BASE64" > keystore.base64.txt
          printf 'KEY_ALIAS=%s\nKEYSTORE_PASSWORD=%s\nKEY_PASSWORD=%s\n' "$KEY_ALIAS" "$KEYSTORE_PASSWORD" "$KEY_PASSWORD" > credentials.txt

      - name: Upload recovered keystore
        uses: actions/upload-artifact@v4
        with:
          name: bookcoin-keystore-recovered
          path: |
            release.keystore
            keystore.base64.txt
            credentials.txt
          retention-days: 1
