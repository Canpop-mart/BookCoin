name: Build & push Docker image

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'server/**'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/docker.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/canpop-mart/bookcoin:latest
            ghcr.io/canpop-mart/bookcoin:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/Canpop-mart/BookCoin
          cache-from: type=gha
          cache-to: type=gha,mode=max
