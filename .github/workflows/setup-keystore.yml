name: Set up release keystore (one-time)

# Run this ONCE (Actions tab → "Run workflow", or `gh workflow run`). It generates an
# Android release keystore and uploads it as a short-lived artifact along with its
# base64 and a generated password. Download the artifact, then set these four repo
# secrets (Settings → Secrets → Actions, or `gh secret set`):
#   KEYSTORE_BASE64    = contents of keystore.base64.txt
#   KEYSTORE_PASSWORD  = the password from credentials.txt
#   KEY_PASSWORD       = the same password
#   KEY_ALIAS          = bookcoin
# CRITICAL: back up release.keystore + the password somewhere safe. If you lose them,
# you can never ship an in-place update again (Android rejects a differently-signed APK).

on:
  workflow_dispatch:

jobs:
  keystore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Generate keystore
        run: |
          ALIAS=bookcoin
          PASS="$(openssl rand -base64 24 | tr -dc 'A-Za-z0-9' | head -c 24)"
          keytool -genkeypair -v -keystore release.keystore -alias "$ALIAS" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$PASS" -keypass "$PASS" \
            -dname "CN=BookCoin, OU=Family, O=BookCoin, C=US"
          base64 -w0 release.keystore > keystore.base64.txt
          printf 'KEY_ALIAS=%s\nKEYSTORE_PASSWORD=%s\nKEY_PASSWORD=%s\n' "$ALIAS" "$PASS" "$PASS" > credentials.txt
          echo "Keystore generated. Set the 4 repo secrets from the artifact, then back up release.keystore + the password."

      - name: Upload keystore artifact
        uses: actions/upload-artifact@v4
        with:
          name: bookcoin-keystore
          path: |
            release.keystore
            keystore.base64.txt
            credentials.txt
          retention-days: 1
